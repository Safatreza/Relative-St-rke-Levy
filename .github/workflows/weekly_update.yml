name: RSL S&P 500 Update

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  update-rsl-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write  # needed to commit the JSON back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSL screening and generate JSON
        run: python run_rsl_live.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/rsl_rankings.json
          git diff --cached --quiet || git commit -m "chore: RSL data update $(date +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Trigger Vercel deployment
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL != '' }}
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl -X POST "$VERCEL_DEPLOY_HOOK_URL"
