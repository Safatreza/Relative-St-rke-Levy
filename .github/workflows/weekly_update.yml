name: Weekly RSL S&P 500 Update

on:
  schedule:
    # Every Monday at 06:00 UTC (after US market close Friday)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  update-rsl-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write  # needed to commit the JSON back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas openpyxl xlsxwriter beautifulsoup4 lxml tqdm requests

      - name: Run RSL screening and generate JSON
        run: python run_rsl_live.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/rsl_rankings.json
          git diff --cached --quiet || git commit -m "chore: weekly RSL data update $(date +'%Y-%m-%d')"
          git push
